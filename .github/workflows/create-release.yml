name: Create Release Branch

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (ex: 1.2)"
        required: true

permissions:
  contents: write

jobs:
  create-release:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout dev
        uses: actions/checkout@v5
        with:
          ref: dev
          fetch-depth: 0

      - name: Check if release branch already exists
        run: |
          VERSION=${{ github.event.inputs.version }}
          if git ls-remote --exit-code --heads origin release/$VERSION; then
            echo "❌ Branch release/$VERSION already exists."
            exit 1
          else
            echo "✅ Branch release/$VERSION does not exist. Continuing."
          fi

      - name: Ensure dev is up to date
        run: |
          git fetch origin dev
          git reset --hard origin/dev

      - name: Create release branch
        run: |
          VERSION=${{ github.event.inputs.version }}
          git checkout -b release/$VERSION
          git push origin release/$VERSION
