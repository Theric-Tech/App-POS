name: Promote Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  promote:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Find matching RC release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |

          echo "Looking for RC matching $TAG..."

          RC_TAG=$(gh release list \
            --json tagName,name,isDraft \
            --jq ".[] | select(.isDraft==true and (.name | contains(\"$TAG\"))) | .tagName" \
            | head -n 1)

          if [ -z "$RC_TAG" ]; then
            echo "❌ Nenhum RC compatível encontrado para $TAG"
            exit 1
          fi

          echo "RC_TAG=$RC_TAG" >> $GITHUB_ENV
          echo "Using RC: $RC_TAG"

      - name: Promote RC to official release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "$RC_TAG" \
            --tag "$TAG" \
            --title "Release $TAG" \
            --draft=false \
            --prerelease=false
