name: CI PR Release

on:
  pull_request:
    branches:
      - "release/*"
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: read
  pull-requests: write

jobs:

  setup:
    uses: ./.github/workflows/ci-base.yml

  build-release:

    name: Build Release

    runs-on: ubuntu-latest
    needs: setup

    if: github.event.action != 'closed'

    steps:

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build Release
        run: ./gradlew assembleRelease

  sync-release-to-dev:

    name: Sync Release to Dev

    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    needs: setup

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create PR from release to dev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |

          RELEASE_BRANCH=${{ github.event.pull_request.base.ref }}

          echo "Checking if PR already exists..."

          EXISTING=$(gh pr list \
            --base dev \
            --head $RELEASE_BRANCH \
            --state open \
            --json number \
            --jq 'length')

          if [ "$EXISTING" -gt 0 ]; then
            echo "PR already exists."
            exit 0
          fi

          echo "Creating PR from $RELEASE_BRANCH to dev"

          gh pr create \
            --base dev \
            --head $RELEASE_BRANCH \
            --title "Sync $RELEASE_BRANCH back to dev" \
            --body "Automatic PR to sync fixes from $RELEASE_BRANCH back to dev."
