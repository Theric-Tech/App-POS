name: CI PR Release

on:
  pull_request:
    branches:
      - "release/*"

jobs:

  setup:
    uses: ./.github/workflows/ci-base.yml

  build-release:

    name: Build Release

    runs-on: ubuntu-latest
    needs: setup

    steps:

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build Release
        run: ./gradlew assembleRelease
