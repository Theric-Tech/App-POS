name: CI #2 - DEV Integration

on:
  push:
    branches:
      - dev

  pull_request:
    branches:
      - dev

concurrency:
  group: ci-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:

  validate-pr:

    name: Validate PR Source

    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest

    steps:
      - name: Validate origin (feature/* → dev)
        run: |
          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"

          echo "Base branch: $BASE"
          echo "Head branch: $HEAD"

          if [[ "$BASE" != "dev" ]]; then
            exit 0
          fi

          if [[ ! "$HEAD" =~ ^feature/ ]]; then
            echo "❌ ERRO: PR para 'dev' deve ter origem em 'feature/*'"
            exit 1
          fi

  build-dev:

    name: Build DEV APK

    runs-on: ubuntu-latest

    if: always()
    needs: [validate-pr]

    steps:

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup base
        uses: ./.github/workflows/ci-base.yml

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK DEV
        uses: actions/upload-artifact@v4
        with:
          name: apk-dev-debug
          path: app/build/outputs/apk/debug/*.apk
