name: Build Artifact

on:
  push:
    branches:
      - "release/*"

  workflow_call:
    inputs:
      branch:
        required: false
        type: string

  workflow_dispatch:
    inputs:
      branch:
        description: "Branch para build (ex: release/1.2)"
        required: false
        type: string

concurrency:
  group: build-artifact-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch || github.ref_name }}

      - name: Resolve branch
        run: |
          BRANCH="${{ github.ref_name }}"

          if [ -n "${{ inputs.branch }}" ]; then
            BRANCH="${{ inputs.branch }}"
          fi

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "Using branch: $BRANCH"

      - name: Validate release branch
        run: |
          if [[ ! "$BRANCH" =~ ^release/ ]]; then
            echo "❌ Este workflow só pode rodar para release/*"
            exit 1
          fi

      - name: Extract version from branch
        run: |
          VERSION_BASE=${BRANCH#release/}

          VERSION_NAME="${VERSION_BASE}.0-rc${GITHUB_RUN_NUMBER}"

          IFS='.' read -r MAJOR MINOR <<< "$VERSION_BASE"
          BASE_CODE=$(printf "%02d%02d00" $MAJOR $MINOR)
          VERSION_CODE=$((BASE_CODE + GITHUB_RUN_NUMBER))

          SHORT_SHA=$(git rev-parse --short HEAD)

          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

          echo "Version Name: $VERSION_NAME"
          echo "Version Code: $VERSION_CODE"

      - name: Setup base
        uses: ./.github/workflows/ci-base.yml

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          NAME="app-${VERSION_NAME}-${SHORT_SHA}.apk"

          mv "$APK" "$NAME"

          echo "APK_NAME=$NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}
